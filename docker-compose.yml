services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
   

  catalogservice:
    build:
      context: ./CatalogService
      dockerfile: Dockerfile
    container_name: catalogservice
    ports:
      - "5001:8080"
    depends_on:
      - redis

  cartservice:
    build:
      context: ./CartService
      dockerfile: Dockerfile
    container_name: cartservice
    ports:
      - "5002:8080"
    depends_on:
      - redis

  orderservice:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    container_name: orderservice
    ports:
      - "5003:8080"
    depends_on:
      - redis
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}  

  gateway:
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "7000:8080"
    depends_on:
      - catalogservice
      - cartservice
      - orderservice
volumes:
  postgres-data: